# ============================================================
#  Configuration Nginx - Projet MASE
#  Fichier : /etc/nginx/sites-available/projet_mase
# ============================================================
#
#  Comment déployer ce fichier sur le serveur Ubuntu :
#
#  1. Copier ce fichier sur le serveur :
#     scp nginx.conf user@192.168.36.109:/tmp/projet_mase
#
#  2. Déplacer dans les sites disponibles :
#     sudo mv /tmp/projet_mase /etc/nginx/sites-available/projet_mase
#
#  3. Activer le site (lien symbolique) :
#     sudo ln -sf /etc/nginx/sites-available/projet_mase /etc/nginx/sites-enabled/projet_mase
#
#  4. Désactiver l'ancien default si besoin :
#     sudo rm -f /etc/nginx/sites-enabled/default
#
#  5. Tester la syntaxe puis recharger :
#     sudo nginx -t && sudo systemctl reload nginx
#
# ============================================================


# ─── Redirection HTTP → HTTPS ────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name _;

    # 308 = Redirect permanent qui CONSERVE la méthode HTTP (POST reste POST)
    # ⚠️  Ne pas utiliser 301 ici car il convertit POST en GET → erreur 405 !
    return 308 https://$host$request_uri;
}


# ─── Serveur principal HTTPS ─────────────────────────────────
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    # Matcher toutes les IPs/domaines (évite les problèmes si l'IP change)
    server_name _;

    # --- Certificats SSL ---
    # Remplace ces chemins par ceux de tes vrais certificats (ex: Let's Encrypt ou auto-signé)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Protocoles et chiffrements sécurisés
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Augmenter la limite pour autoriser l'upload de fichiers lourds (vidéos, etc.)
    client_max_body_size 200M;

    # ─── API Django (/api/ et /auth/) ────────────────────────
    # Toutes les requêtes vers /api/ et /auth/ sont transmises
    # à Gunicorn (Django) qui tourne sur le port 8000.
    # IMPORTANT : on autorise toutes les méthodes HTTP
    # (GET, POST, PUT, PATCH, DELETE, OPTIONS) pour éviter le 405.

    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Transmettre la méthode HTTP originale (POST, DELETE, PATCH…)
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;

        # Délais généreux pour les requêtes longues (génération PDF, upload)
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass_request_headers on;
        proxy_pass_request_body    on;

        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # ─── Admin Django (/admin/) ───────────────────────────────
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass_request_headers on;
        proxy_pass_request_body    on;
    }

    # ─── Fichiers statiques Django (/static/) ─────────────────
    # Les fichiers statiques de Django (admin CSS, etc.) sont
    # servis directement par Nginx pour de meilleures performances.
    location /static/ {
        alias /var/www/Projet_MASE/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Fichiers media Django (/media/) ─────────────────────
    # Les uploads utilisateurs (photos d'auto-contrôle, etc.)
    location /media/ {
        alias /var/www/Projet_MASE/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── Frontend Next.js (tout le reste) ────────────────────
    # Toutes les autres requêtes sont envoyées au serveur Next.js
    # qui tourne sur le port 3000 via PM2.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Nécessaire pour le hot-reload (WebSocket) de Next.js
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}
